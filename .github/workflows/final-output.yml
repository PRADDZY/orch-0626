name: Final Output

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      PROMPT_VERSION: gha-final-output-20260620a
      NIM_POLL_TIMEOUT_SECONDS: "90"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r code/requirements.txt

      - name: Compile code
        run: python -m compileall code

      - name: Generate output.csv
        run: python code/main.py --strategy ensemble --output output.csv

      - name: Prepare submission artifacts
        run: |
          mkdir -p submission
          cp output.csv submission/output.csv
          python - <<'PY'
          from pathlib import Path
          import shutil

          repo = Path.cwd()
          package_root = repo / "_package"
          if package_root.exists():
              shutil.rmtree(package_root)
          package_root.mkdir()

          include_paths = [
              repo / "README.md",
              repo / "AGENTS.md",
              repo / "problem_statement.md",
              repo / ".gitignore",
              repo / "code",
              repo / "dataset",
          ]

          for source in include_paths:
              target = package_root / source.name
              if source.is_dir():
                  shutil.copytree(source, target, ignore=shutil.ignore_patterns(".cache"))
              else:
                  shutil.copy2(source, target)

          archive_base = repo / "submission" / "code"
          shutil.make_archive(str(archive_base), "zip", root_dir=package_root)
          shutil.rmtree(package_root)
          PY

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-output
          path: |
            output.csv
            submission/output.csv

      - name: Upload submission bundle
        uses: actions/upload-artifact@v4
        with:
          name: submission-bundle
          path: |
            submission/code.zip
